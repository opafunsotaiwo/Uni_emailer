<!DOCTYPE html>
<html>
<head>
    <title>UniBulk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h2>🎓 University Emailer</h2>
    <form id="emailForm" action="/send" method="POST" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="fw-bold">1. Upload Recipient List (.csv)</label>
        <input type="file" id="fileInput" name="file" class="form-control" required>
        <small class="text-muted">Ensure headers are 'email' and 'name'.</small>
    </div>

    <div class="mb-3">
        <label class="fw-bold">2. Subject Line</label>
        <input type="text" id="subjectInput" name="subject" class="form-control" placeholder="e.g., Final Exam Schedule" required>
    </div>

    <div class="mb-3">
        <label class="fw-bold">3. Message Body</label>
        <textarea name="message" class="form-control" rows="6" placeholder="Type your announcement here..." required></textarea>
    </div>

    <button type="button" class="btn btn-primary w-100" onclick="showConfirm()">Review & Send</button>

    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Final Check</h5>
                </div>
                <div class="modal-body">
                    <p>You are about to send a blast with the subject: <strong id="displaySubject"></strong></p>
                    <p class="text-danger"><strong>Warning:</strong> This action cannot be undone.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger">Confirm & Send Now</button>
                </div>
            </div>
        </div>
    </div>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function showConfirm() {
    const subject = document.getElementById('subjectInput').value;
    if(!subject) {
        alert("Please fill out the subject first!");
        return;
    }
    document.getElementById('displaySubject').innerText = subject;
    var myModal = new bootstrap.Modal(document.getElementById('confirmModal'));
    myModal.show();
}
</script>
</body>
</html>
